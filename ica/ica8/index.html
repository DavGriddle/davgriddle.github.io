<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Fancy letterheaded paper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article>
      <img
        class="imgHeader"
        src="top-image.png"
        alt="Letterhead header image"
      />

      <h1>Awesome<br />Company</h1>

      <address>
        <p>The Awesome Company</p>
        <p>
          102-112 Frail Bend Bridge<br />
          The Dwindlings<br />
          Little Hornet<br />
          HX3 9ZQ<br />
          UK
        </p>
      </address>
      <img
        class="imgFooter"
        src="bottom-image.png"
        alt="Letterhead footer image"
      />
    </article>
  </body>
</html>
